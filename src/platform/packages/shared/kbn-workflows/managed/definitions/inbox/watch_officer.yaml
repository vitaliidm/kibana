version: "1"
name: Watch Officer
description: >
  Tier-2 Watch Officer skeleton (Daybreak). Escalates criticals, drafts briefs,
  and stages gated response proposals for human approval.
enabled: true
tags:
  - watch
  - watch-officer
triggers:
  - type: manual
steps:
  - name: watch_policy
    type: data.set
    with:
      watch:
        mandate: Escalation & briefs
        autonomyLevel: 4
        handoff: oncall
        onDemand: false
        draft: false
        cadence: stream
        mode: always
        ui:
          color: "#3b82f6"
          icon: bell
          order: 20
        scopeSummary: Open threads · on-call · deploys
        scopes:
          - name: Open threads · cases
            access: full
            label: Read
          - name: On-call schedule
            access: full
            label: Read
          - name: Deploy history
            access: full
            label: Read
        # Capabilities are projected from executable steps (see Floor). Add
        # ai.agent skill://… or workflow.execute targets, then optional overrides here.
        callables: []
  - name: draft_proposal
    type: data.set
    with:
      reasoning:
        summary: "Watch Officer skeleton — staged a gated proposal for review."
        sections:
          - title: NEXT
            body: "Replace with investigation / proposal skills and real evidence."
  - name: await_approval
    type: waitForInput
    with:
      message: "Approve the Watch Officer draft proposal?"
      schema:
        type: object
        properties:
          decision:
            type: string
            enum: [approve, modify, dismiss]
        required: [decision]
