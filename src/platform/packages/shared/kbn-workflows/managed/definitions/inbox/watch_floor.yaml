version: "1"
name: Watch Floor
description: >
  Tier-1 Watch Floor (Daybreak). Triages alerts via the alert-analysis skill.
  Full Alert Analysis managed-workflow wrap (workflow.execute) is the next Floor spike.
enabled: true
tags:
  - watch
  - watch-floor
triggers:
  - type: alert
  - type: manual
steps:
  - name: watch_policy
    type: data.set
    with:
      watch:
        mandate: Frontline triage
        autonomyLevel: 3
        handoff: officer
        onDemand: false
        draft: false
        cadence: stream
        mode: always
        ui:
          color: "#16b3a6"
          icon: alert
          order: 10
        scopeSummary: Security indices · APM · logs
        scopes:
          - name: Security indices
            access: full
            label: Read
          - name: APM · logs · SLOs
            access: full
            label: Read
          - name: Finance PII
            access: masked
            label: Masked
        # Display overrides only — capabilities are projected from steps below.
        callables:
          - id: alert-analysis
            name: Alert analysis
            kind: skill
            summary: On alert · classifies FP / TP / inconclusive
            gated: false
            enabled: true
  - name: triage_alerts
    type: ai.agent
    timeout: "10m"
    create-conversation: true
    with:
      message: >
        Use the [/alert-analysis](skill://alert-analysis) skill to triage the
        security alert context below. Prefer recall over precision when unsure.
        Return a structured classification.

        Alert / event context:
        {{ event | json }}
      schema:
        type: object
        properties:
          classification:
            type: string
            enum:
              - false_positive
              - true_positive
              - inconclusive
            description: Classification of the alert based on analysis
          confidence_score:
            type: number
            minimum: 0
            maximum: 1
            description: Confidence from 0.0–1.0
          rationale:
            type: string
            description: Brief human-readable explanation
        required:
          - classification
          - confidence_score
          - rationale
  - name: record_reasoning
    type: data.set
    with:
      reasoning:
        summary: >-
          {{ steps.triage_alerts.output.structured_output.rationale
          | default: "Watch Floor triage completed." }}
        sections:
          - title: Classification
            body: >-
              {{ steps.triage_alerts.output.structured_output.classification
              | default: "inconclusive" }}
              (confidence
              {{ steps.triage_alerts.output.structured_output.confidence_score
              | default: "n/a" }})
