version: "1"
name: Deep Watch
description: >
  Deep Watch skeleton (Daybreak). Specialist, on-demand depth — forensics,
  hunts, and draft-only conclusions under human review.
enabled: true
tags:
  - watch
  - watch-deep
triggers:
  - type: manual
steps:
  - name: watch_policy
    type: data.set
    with:
      watch:
        mandate: Deep investigation & hunts
        autonomyLevel: 3
        handoff: records
        onDemand: true
        draft: false
        cadence: manual
        from: 8
        to: 18
        mode: window
        ui:
          color: "#8b5cf6"
          icon: console
          order: 40
        scopeSummary: Security indices · EDR · DNS
        scopes:
          - name: Security indices
            access: full
            label: Read
          - name: EDR telemetry
            access: full
            label: Read
          - name: DNS · netflow
            access: full
            label: Read
        # Capabilities projected from executable steps — see Watch Floor.
        callables: []
  - name: specialist_stub
    type: console
    with:
      message: "Deep Watch skeleton — add ai.agent / skill steps (see Floor)"
